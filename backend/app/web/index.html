<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Katha — Vikram aur Betaal</title>
<style>
  :root{
    --gold:#C9A84C; --ink:#0b1026; --panel:rgba(8,10,28,.82);
    --text:#f3ead4; --dim:#b9b09a; --saffron:#e8a33d;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
    color:var(--text);background:#05060f;overflow:hidden}
  #scene{position:fixed;inset:0;transition:background 1.2s ease;
    background:radial-gradient(120% 90% at 50% 10%,#26306b 0%,#141a3c 45%,#070a1c 100%)}
  #scene.bg-court{background:radial-gradient(120% 90% at 50% 10%,#5a3a1e 0%,#2c1f12 50%,#0b0a08 100%)}
  #scene.bg-cremation{background:radial-gradient(120% 90% at 50% 0%,#2a2150 0%,#161235 50%,#070612 100%)}
  #scene.bg-river{background:radial-gradient(120% 90% at 50% 10%,#16384a 0%,#0e2230 50%,#060e16 100%)}
  #scene.bg-climax{background:radial-gradient(120% 100% at 50% 30%,#5b1622 0%,#27101c 50%,#0a0510 100%)}
  #vignette{position:fixed;inset:0;box-shadow:inset 0 0 220px 60px rgba(0,0,0,.75);pointer-events:none}
  #bgimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .8s}
  #portimg{width:172px;height:210px;object-fit:contain;display:none;filter:drop-shadow(0 0 30px rgba(201,168,76,.4))}

  #hud{position:fixed;top:0;left:0;right:0;display:flex;gap:18px;align-items:center;
    padding:10px 18px;font-size:13px;color:var(--dim);letter-spacing:.04em;
    background:linear-gradient(#05060f,rgba(5,6,15,0));z-index:5}
  #hud .title{color:var(--gold);font-weight:600;letter-spacing:.12em;text-transform:uppercase}
  #hud .stat{padding:2px 10px;border:1px solid rgba(201,168,76,.35);border-radius:20px}
  #hud .grow{flex:1}
  #voice{cursor:pointer;border:1px solid rgba(201,168,76,.35);border-radius:20px;padding:2px 10px}

  #portraitWrap{position:fixed;left:0;right:0;top:46%;transform:translateY(-50%);
    display:flex;justify-content:center;pointer-events:none}
  #portrait{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:64px;color:#1a1330;background:radial-gradient(circle at 35% 30%,#f6d98a,#c9a84c 70%,#6b531f);
    box-shadow:0 0 60px 10px rgba(201,168,76,.25);border:2px solid rgba(255,255,255,.25);
    transition:transform .4s, box-shadow .4s}
  #portrait.intense{box-shadow:0 0 70px 14px rgba(232,120,60,.45);transform:scale(1.04)}
  #portrait.grave{filter:saturate(.7) brightness(.85)}
  #expr{margin-top:10px;text-align:center;color:var(--dim);font-size:12px;letter-spacing:.2em;text-transform:uppercase}

  #panel{position:fixed;left:0;right:0;bottom:0;background:var(--panel);
    border-top:2px solid var(--gold);backdrop-filter:blur(3px);
    padding:18px 22px 22px;max-height:48%;display:flex;flex-direction:column;z-index:4}
  #speaker{color:var(--gold);font-size:15px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px}
  #line{font-size:19px;line-height:1.6;min-height:3.2em;white-space:pre-wrap;cursor:pointer;overflow:auto}
  #ambient{color:var(--dim);font-style:italic;font-size:12px;margin-top:6px}
  #controls{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .choices{display:flex;flex-direction:column;gap:8px}
  .choice{text-align:left;background:rgba(201,168,76,.10);color:var(--text);border:1px solid rgba(201,168,76,.5);
    padding:11px 14px;border-radius:8px;font-size:16px;cursor:pointer;font-family:inherit;transition:.15s}
  .choice:hover{background:rgba(201,168,76,.22);transform:translateX(3px)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  #say{flex:1;min-width:180px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);
    color:var(--text);padding:10px 12px;border-radius:8px;font-family:inherit;font-size:15px}
  .btn{background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,.5);
    padding:10px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:14px;transition:.15s}
  .btn:hover{background:rgba(201,168,76,.15)}
  .btn.primary{background:var(--gold);color:#1a1330;font-weight:600}
  #ending{display:none;position:fixed;inset:0;z-index:9;background:rgba(5,4,12,.92);
    flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
  #ending h1{color:var(--gold);letter-spacing:.2em;text-transform:uppercase}
  #ending p{max-width:680px;font-size:18px;line-height:1.7}
  select{background:#0d1230;color:var(--text);border:1px solid rgba(201,168,76,.4);border-radius:8px;padding:8px}
</style>
</head>
<body>
  <div id="scene"><img id="bgimg" alt=""></div><div id="vignette"></div>

  <div id="hud">
    <span class="title">Katha · Vikram&nbsp;aur&nbsp;Betaal</span>
    <span class="stat" id="hScene">—</span>
    <span class="stat" id="hTrust">Trust 0</span>
    <span class="stat" id="hDharma">Dharma 0</span>
    <span class="grow"></span>
    <span id="voice" title="Speak the dialogue (browser speech; Sarvam when a key is set)">🔇 Voice</span>
  </div>

  <div id="portraitWrap"><div><img id="portimg" alt=""><div id="portrait">ॐ</div><div id="expr"></div></div></div>

  <div id="panel">
    <div id="speaker">—</div>
    <div id="line" title="click to skip the typewriter"></div>
    <div id="ambient"></div>
    <div id="controls">
      <div class="choices" id="choices"></div>
      <div class="row">
        <input id="say" placeholder="Speak to them, or question a character by name…" />
        <button class="btn" id="sendBtn">Speak</button>
        <button class="btn" id="continueBtn">Continue ▸</button>
        <button class="btn" id="nextBtn">Next scene ▸</button>
        <select id="jump"></select>
      </div>
    </div>
  </div>

  <div id="ending"><h1 id="endTitle"></h1><p id="endText"></p>
    <button class="btn primary" onclick="location.reload()">Walk the road again</button></div>

<script>
const SID = "web-" + Math.random().toString(36).slice(2);
let season = [], idx = 0, scene = "prologue", typing = null;
let voiceOn = false, ttsEnabled = false, lastRender = null, curAudio = null;

// Browser-speech hints per voice_profile (free fallback when Sarvam isn't enabled).
const VOICE = {
  betaal_sonorous:{pitch:0.6,rate:0.86}, sutradhar:{pitch:0.8,rate:0.95},
  king_regal:{pitch:0.9,rate:0.95}, m_unctuous:{pitch:1.05,rate:0.95},
  f_grave:{pitch:0.9,rate:0.9}, f_soft:{pitch:1.0,rate:0.92}, m_child:{pitch:1.3,rate:1.0},
  m_grave:{pitch:0.8,rate:0.9}, m_young:{pitch:1.15,rate:1.0}, m_broken:{pitch:0.8,rate:0.85},
};

const $ = id => document.getElementById(id);
const portraitGlyph = sp => ({Betaal:"☾",Narrator:"❖",Kshantishila:"⚯",Vikramaditya:"♛",
  Madanasundari:"✿",Maiden:"✿"}[sp] || sp[0] || "•");

function bgClass(sceneId){
  if(sceneId.includes("prologue")) return "bg-court";
  if(sceneId.includes("climax")) return "bg-climax";
  if(sceneId.includes("three-suitors")) return "bg-river";
  return "bg-cremation";
}

async function turn(playerInput="", choiceId=null){
  const r = await fetch("/turn",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id:SID, player_input:playerInput, choice_id:choiceId, scene_id:scene})});
  render(await r.json());
}

function typewriter(text){
  clearInterval(typing); const el=$("line"); el.textContent=""; let i=0;
  typing=setInterval(()=>{ el.textContent=text.slice(0,++i); el.scrollTop=el.scrollHeight;
    if(i>=text.length) clearInterval(typing); }, 16);
  el.onclick=()=>{ clearInterval(typing); el.textContent=text; };
}

function stopSpeech(){
  if(curAudio){ curAudio.pause(); curAudio=null; }
  if(window.speechSynthesis) window.speechSynthesis.cancel();
}

function pickVoice(){
  const vs = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  return vs.find(v=>/en-IN|hi-IN/i.test(v.lang)) || vs.find(v=>/en/i.test(v.lang)) || vs[0] || null;
}

async function speak(r){
  if(!voiceOn || !r || !r.line) return;
  stopSpeech();
  if(ttsEnabled){ // Sarvam (production)
    try{
      const res = await fetch("/tts",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:r.line, voice_profile:r.voice_profile})});
      const data = await res.json();
      if(data.audio){ curAudio = new Audio("data:audio/wav;base64,"+data.audio); curAudio.play(); return; }
    }catch(e){ /* fall through to browser speech */ }
  }
  if(window.speechSynthesis){ // free browser fallback
    const u = new SpeechSynthesisUtterance(r.line.replace(/[*"]/g,""));
    const p = VOICE[r.voice_profile] || {pitch:1,rate:1};
    u.pitch = p.pitch; u.rate = p.rate;
    const v = pickVoice(); if(v) u.voice = v;
    window.speechSynthesis.speak(u);
  }
}

// Use real generated art if present (assets/), else fall back to the procedural look.
function setArt(m, r){
  const bg = $("bgimg");
  if(m.background){
    bg.onload = ()=>{ bg.style.opacity = 1; };
    bg.onerror = ()=>{ bg.style.opacity = 0; };       // no file -> gradient shows through
    bg.src = "/assets/backgrounds/" + m.background + ".jpg";
  } else { bg.style.opacity = 0; }

  const pid = m.speaker_id, pi = $("portimg"), pc = $("portrait");
  if(!pid){ pi.style.display = "none"; pc.style.display = "flex"; return; }
  pi.dataset.fb = "";
  pi.onload = ()=>{ pi.style.display = "block"; pc.style.display = "none"; };
  pi.onerror = ()=>{
    if(!pi.dataset.fb){ pi.dataset.fb = "1"; pi.src = "/assets/characters/" + pid + ".png"; }
    else { pi.style.display = "none"; pc.style.display = "flex"; }   // no art -> glyph
  };
  pi.src = "/assets/characters/" + pid + "_" + (r.expression || "neutral") + ".png";
}

function render(r){
  lastRender = r;
  $("scene").className = bgClass(r.scene_id);
  $("speaker").textContent = r.speaker;
  $("portrait").textContent = portraitGlyph(r.speaker);
  $("portrait").className = r.expression||"";
  $("expr").textContent = r.expression||"";
  $("ambient").textContent = r.ambient ? "❧ " + r.ambient : "";
  setArt(r.meta || {}, r);
  typewriter(r.line);
  speak(r);

  const m=r.meta||{};
  $("hTrust").textContent = "Trust " + (m.trust??0);
  $("hDharma").textContent = "Dharma " + (m.dharma??0);
  $("hScene").textContent = (season[idx]?season[idx].title:scene);

  const box=$("choices"); box.innerHTML="";
  (r.choices||[]).forEach(c=>{
    const b=document.createElement("button"); b.className="choice"; b.textContent=c.label;
    b.onclick=()=>turn("", c.id); box.appendChild(b);
  });

  if(m.advance_to){ // prologue -> tale 1
    const b=document.createElement("button"); b.className="choice";
    b.textContent="▸ Take up the corpse and walk on…";
    b.onclick=()=>{ scene=m.advance_to; idx=season.findIndex(s=>s.id===scene); $("jump").value=scene; turn("begin"); };
    box.appendChild(b);
  }
  if(m.season_complete){ endScreen(m.outcome); }
}

function endScreen(outcome){
  const titles={king_triumphant:"Emperor of the Age",just_but_empty:"Just, and Empty-Handed",
    narrow_escape:"A Narrow Escape"};
  $("endTitle").textContent = titles[outcome]||"The Road Ends";
  $("endText").textContent = $("line").textContent;
  $("ending").style.display="flex";
}

function nextScene(){
  if(idx < season.length-1){ idx++; scene=season[idx].id; $("jump").value=scene; turn("begin"); }
}

async function init(){
  const s = await (await fetch("/season")).json();
  season = s.order;
  ttsEnabled = !!s.tts_enabled;
  if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged = pickVoice; // warm voice list
  const sel=$("jump"); season.forEach((t,i)=>{ const o=document.createElement("option");
    o.value=t.id; o.textContent=(i+1)+". "+t.title; sel.appendChild(o); });
  sel.onchange=()=>{ scene=sel.value; idx=season.findIndex(s=>s.id===scene); turn("begin"); };
  $("sendBtn").onclick=()=>{ const v=$("say").value.trim(); if(v){ $("say").value=""; turn(v); } };
  $("say").addEventListener("keydown",e=>{ if(e.key==="Enter") $("sendBtn").click(); });
  $("continueBtn").onclick=()=>turn("continue");
  $("nextBtn").onclick=nextScene;
  $("voice").onclick=()=>{
    voiceOn = !voiceOn;
    $("voice").textContent = voiceOn ? "🔊 Voice" : "🔇 Voice";
    if(voiceOn){ speak(lastRender); } else { stopSpeech(); }
  };
  turn("begin"); // opens on the prologue
}
init();
</script>
</body>
</html>
